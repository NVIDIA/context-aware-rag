---
# Environment configuration

tools:
  vector_db:
    type: milvus
    params:
      host: !ENV ${MILVUS_DB_HOST}
      port: !ENV ${MILVUS_DB_PORT}
    tools:
      embedding: nvidia_embedding

  elasticsearch_db:
    type: elasticsearch
    params:
      host: !ENV ${ES_HOST}
      port: !ENV ${ES_PORT}
    tools:
      embedding: nvidia_embedding

  summarization_llm:
    type: llm
    params:
      model: !ENV ${LVS_LLM_MODEL_NAME_0}
      base_url: !ENV ${LVS_LLM_BASE_URL_0}
      max_tokens: 2048
      temperature: 0.2
      top_p: 0.7
      api_key: !ENV ${NVIDIA_API_KEY}

  nvidia_embedding:
    type: embedding
    params:
      model: !ENV ${LVS_EMB_MODEL_NAME}
      base_url: !ENV ${LVS_EMB_BASE_URL}
      api_key: !ENV ${NVIDIA_API_KEY}

  nvidia_reranker:
    type: reranker
    params:
      model: !ENV ${LVS_RERANK_MODEL_NAME}
      base_url: !ENV ${LVS_RERANK_BASE_URL}
      api_key: !ENV ${NVIDIA_API_KEY}

functions:
  vlm_structured_summarization:
    type: vlm_structured_summarization
    params:
      time_overlap_threshold: 0.1
      max_events_per_batch: 50
      prompts:
        caption: |
          You are an advanced intelligent video analysis system. Carefully analyze the video and identify all significant events, activities, objects, people, and interactions that occur.

          For each detected event, you must determine:

          1. The start time (in seconds) when the event begins.
          2. The end time (in seconds) when the event ends.
          3. A clear and concise description of what happens during that time window.

          Only describe what is visibly present in the frames — do not infer or imagine details beyond what is seen. Be objective and factual.

          Return your final answer strictly as a JSON object with the following schema:

          {
            "events": [
              {
                "start_time": <number>,
                "end_time": <number>,
                "description": "<string>"
              }
            ]
          }


          Each event should capture a single coherent action or change (e.g., “A person picks up a box and walks away” or “A car enters the frame from the left”).
          Ensure all timestamps are accurate and that your response is valid JSON parsable by standard JSON libraries.
        caption_summarization: "N/A"
        summary_aggregation: "N/A"
    tools:
      db: !ENV ${LVS_DATABASE_BACKEND}
      llm: summarization_llm

context_manager:
  functions:
    - vlm_structured_summarization
